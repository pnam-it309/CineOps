version: '3.8'

services:
  # MySQL Database Service
  db:
    image: mysql:8.0
    container_name: cineops-db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-cineops}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MYSQL_USER: ${DB_USER:-cineops_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-cineops_password}
    ports:
      - "3306:3306"
    volumes:
      - cineops-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cineops-net

  # Spring Boot Backend Service
  backend:
    build:
      context: ./BE
      dockerfile: Dockerfile
    container_name: cineops-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/${DB_NAME:-cineops}?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-cineops_user}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-cineops_password}
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_key_for_jwt}
      # Other env vars can be added here
    ports:
      - "8080:8080"
    networks:
      - cineops-net

  # Vue.js Frontend Service
  frontend:
    build:
      context: ./FE
      dockerfile: Dockerfile
    container_name: cineops-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - cineops-net

networks:
  cineops-net:
    driver: bridge

volumes:
  cineops-mysql-data:
    driver: local
