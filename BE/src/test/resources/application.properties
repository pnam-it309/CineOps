spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Security should be mocked via @WithMockUser, but we keep settings standard
spring.security.oauth2.client.registration.google.client-id=test
spring.security.oauth2.client.registration.google.client-secret=test

# Email
spring.mail.host=localhost

# Frontend & CORS
frontend.url=http://localhost:3000
allowed.origin=http://localhost:3000

# App Config / Seeder properties
GENERATE_DB=false
USER_EMAIL=admin@test.com
USER_CODE=ADMIN001
USER_NAME=Admin
USER_PHONE=0123456789
ROLE=ADMIN
USER_PASSWORD=password

# Flyway - disable for tests to avoid MySQL-specific scripts failing on H2
spring.flyway.enabled=false

# Cloudinary - mock values
cloudinary.cloud-name=test
cloudinary.api-key=test
cloudinary.api-secret=test

# JWT - mock values
jwt.secret=test-secret-key-that-is-long-enough-for-hs256-algorithm-123456
jwt.expiration=3600000
