name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  BE_IMAGE_NAME: ${{ github.repository }}/backend
  FE_IMAGE_NAME: ${{ github.repository }}/frontend

jobs:
  # ===== Build and Push Docker Images =====
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    # Trigger only on successful CI from main/develop or manual dispatch
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
      packages: write

    outputs:
      be-image: ${{ steps.meta-be.outputs.tags }}
      fe-image: ${{ steps.meta-fe.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Backend Build & Push
      - name: Extract metadata for Backend
        id: meta-be
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BE_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./BE
          push: true
          tags: ${{ steps.meta-be.outputs.tags }}
          labels: ${{ steps.meta-be.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Frontend Build & Push
      - name: Extract metadata for Frontend
        id: meta-fe
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FE_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./FE
          push: true
          tags: ${{ steps.meta-fe.outputs.tags }}
          labels: ${{ steps.meta-fe.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===== Deploy to Server =====
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.prod.yml" # Matches correct filename
          target: "/opt/cineops" # Matches the directory we decided

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            mkdir -p /opt/cineops
            cd /opt/cineops
            
            # 1. Update Env Vars using secrets
            # These names map to what you have in compose and properties.
            echo "Generating .env file..."
            cat <<EOF > .env
            DB_NAME=cineops
            DB_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            DB_USER=cineops_user
            DB_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            # Inject dynamic tags for images
            BE_IMAGE=${{ needs.build-and-push.outputs.be-image }}
            FE_IMAGE=${{ needs.build-and-push.outputs.fe-image }}
            EOF
            
            # 2. Deploy with minimal downtime
            echo "Zero-downtime deployment in progress..."
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            
            # 3. Cleanup unused images
            docker image prune -a -f
