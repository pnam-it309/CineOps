version: '3.8'

services:
  # MySQL Database Service (Production)
  db:
    image: mysql:8.0
    container_name: cineops-db-prod
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-cineops}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD} # Required secret
      MYSQL_USER: ${DB_USER:-cineops_user}
      MYSQL_PASSWORD: ${DB_PASSWORD} # Required secret
    ports:
      - "3306:3306"
    volumes:
      - mysql-prod-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cineops-prod-net

  # Spring Boot Backend Service (Production)
  backend:
    image: ${BE_IMAGE} # Injected from .env during CI/CD
    container_name: cineops-backend-prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/${DB_NAME:-cineops}?useSSL=false
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-cineops_user}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    expose:
      - "8080"
    networks:
      - cineops-prod-net

  # Vue.js Frontend Service (Production)
  frontend:
    image: ${FE_IMAGE} # Injected from .env during CI/CD
    container_name: cineops-frontend-prod
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    networks:
      - cineops-prod-net

networks:
  cineops-prod-net:
    driver: bridge

volumes:
  mysql-prod-data:
    driver: local
