<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quét CCCD Liên Tục</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .scanner-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 90%;
        }

        .title {
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: 600;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto 20px;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
        }

        #video {
            width: 100%;
            height: auto;
            display: block;
            transform: scaleX(-1);
        }

        .scan-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
        }

        .guide-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border: 3px solid #00ff88;
            border-radius: 15px;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.5);
            animation: pulse 2s infinite;
        }

        .guide-corners {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 3px solid #00ff88;
        }

        .corner.tl { top: -3px; left: -3px; border-right: none; border-bottom: none; }
        .corner.tr { top: -3px; right: -3px; border-left: none; border-bottom: none; }
        .corner.bl { bottom: -3px; left: -3px; border-right: none; border-top: none; }
        .corner.br { bottom: -3px; right: -3px; border-left: none; border-top: none; }

        .guide-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            font-size: 14px;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        }

        .status-panel {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .status-value {
            font-weight: 600;
        }

        .status-good { color: #00ff88; }
        .status-bad { color: #ff4444; }
        .status-neutral { color: #ffaa00; }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            color: white;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .result-panel {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }

        .result-panel.show {
            display: block;
        }

        .result-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 12px;
            word-break: break-all;
        }

        .loading-spinner {
            display: none;
            width: 40px;
            height: 40px;
            margin: 20px auto;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #00ff88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-spinner.show {
            display: block;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid #ff4444;
            border-radius: 8px;
            padding: 10px;
            margin: 10px 0;
            text-align: center;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #00ff88;
            color: #000;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 600;
            display: none;
            animation: slideIn 0.5s ease;
        }

        .success-indicator.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 600px) {
            .scanner-container {
                padding: 20px;
            }
            
            .guide-box {
                width: 150px;
                height: 150px;
            }
            
            .title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="scanner-container">
        <h1 class="title">📱 Hệ Thống Quét CCCD Liên Tục</h1>
        
        <div class="video-wrapper">
            <video id="video" autoplay playsinline></video>
            <div class="scan-overlay">
                <div class="guide-box">
                    <div class="guide-corners">
                        <div class="corner tl"></div>
                        <div class="corner tr"></div>
                        <div class="corner bl"></div>
                        <div class="corner br"></div>
                    </div>
                    <div class="guide-text">
                        Đưa mã QR vào<br>
                        khung này
                    </div>
                </div>
                <div class="success-indicator" id="successIndicator">
                    ✅ Quét thành công!
                </div>
            </div>
        </div>

        <div class="status-panel">
            <div class="status-item">
                <span>Trạng thái camera:</span>
                <span class="status-value" id="cameraStatus">Đang khởi động...</span>
            </div>
            <div class="status-item">
                <span>Chất lượng ảnh:</span>
                <span class="status-value" id="imageQuality">Đang phân tích...</span>
            </div>
            <div class="status-item">
                <span>Số lần thử:</span>
                <span class="status-value" id="attemptCount">0</span>
            </div>
            <div class="status-item">
                <span>Tốc độ quét:</span>
                <span class="status-value" id="scanRate">3 frame/giây</span>
            </div>
        </div>

        <div class="error-message" id="errorMessage"></div>
        
        <div class="loading-spinner" id="loadingSpinner"></div>

        <div class="controls">
            <button class="btn btn-primary" id="startBtn">Bắt đầu quét</button>
            <button class="btn btn-secondary" id="stopBtn" disabled>Dừng lại</button>
            <button class="btn btn-secondary" id="switchCameraBtn">Chuyển camera</button>
        </div>

        <div class="result-panel" id="resultPanel">
            <h3>Kết quả quét:</h3>
            <div id="resultContent"></div>
        </div>
    </div>

    <!-- Audio for success feedback -->
    <audio id="successSound" preload="auto">

    </audio>

    <script src="continuous-scanner.js"></script>
</body>
</html>
